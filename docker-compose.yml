services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jardineria
      POSTGRES_USER: jardineria
      POSTGRES_PASSWORD: jardineria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jardineria"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jardineria
      DB_USER: jardineria
      DB_PASSWORD: jardineria
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
